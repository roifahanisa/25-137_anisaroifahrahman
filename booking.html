<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Mobil</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .custom-card{
            border:none;
            border-radius:20px;
        }

        .btn-custom{
            background:#2563eb;
            color:white;
            border:none;
        }

        .btn-custom:hover{
            background:#1d4ed8;
            color:white;
        }

        footer{
            background:#111827;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:50px;
        }
    </style>
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand fw-bold" href="index.html">
            Rental Mobil
        </a>

        <button class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="booking.html">
                        Booking
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="mobil.html">
                        Mobil
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="transaksi.html">
                        Transaksi
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="about.html">
                        About
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <div class="card custom-card shadow p-4">

        <h2 class="text-center mb-4">
            Form Booking Mobil
        </h2>

        <form>
            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Nama
                    </label>

                    <input type="text"
                    class="form-control"
                    placeholder="Masukkan nama">
                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    <input type="email"
                    class="form-control"
                    placeholder="Masukkan email">
                </div>


                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        No HP
                    </label>

                    <input type="number"
                    class="form-control"
                    placeholder="Masukkan nomor HP">
                </div>


                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Pilih Mobil
                    </label>

                    <select class="form-select">

                        <option>Avanza</option>
                        <option>Pajero</option>
                        <option>Brio</option>
                        <option>Fortuner</option>
                    </select>
                </div>


                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Tanggal Rental
                    </label>

                    <input type="date"
                    class="form-control">
                </div>


                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Tanggal Kembali
                    </label>

                    <input type="date"
                    class="form-control">
                </div>


                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Pakai Supir
                    </label>

                    <select class="form-select">

                        <option>Tidak</option>
                        <option>Ya</option>
                    </select>
                </div>
            </div>

            <button class="btn btn-custom w-100 mt-3">
                Booking Sekarang
            </button>
        </form>
    </div>
</div>

<footer>
    © 2026 Rental Mobil
</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
